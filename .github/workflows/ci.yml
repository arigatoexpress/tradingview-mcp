name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # No-spend posture: when this satellite repo is run on the shared
  # self-hosted Sapphire runner, /Users/aribs is the home dir, not
  # /Users/runner. Keeping setup-node's tool cache writable avoids
  # falling back to a paid hosted runner on cache miss.
  AGENT_TOOLSDIRECTORY: /Users/aribs/.github-runners/toolcache
  RUNNER_TOOL_CACHE: /Users/aribs/.github-runners/toolcache

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Unit tests (Node 20)
    if: ${{ vars.SAPPHIRE_RUNNER != '' }}
    runs-on: ${{ fromJSON(vars.SAPPHIRE_RUNNER || '"ubuntu-latest"') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test
